<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EducaFlix | Cadastro</title>
    <meta name="description" content="Crie sua conta no EducaFlix e comece a estudar com vídeos educacionais organizados por trilhas." />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Sora:wght@600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./design-system/base.css" />
    <link rel="stylesheet" href="./design-system/components.css" />
  </head>
  <body>
    <app-header current="cadastro"></app-header>

    <main class="page auth">
      <section class="container">
        <div class="auth__wrap">
          <h1 class="auth__title">Criar conta no EducaFlix</h1>
          <p class="auth__subtitle">Preencha os dados abaixo para começar sua jornada de estudos.</p>

          <form class="auth__form" action="#" method="post">
            <app-input label="Nome" name="nome" id="nome" type="text" placeholder="Seu nome completo"></app-input>
            <app-input label="E-mail" name="email" id="email" type="email" placeholder="voce@exemplo.com"></app-input>
            <app-input label="Senha" name="senha" id="senha" type="password" placeholder="Digite sua senha"></app-input>
            <app-input
              label="Confirmar senha"
              name="confirmar_senha"
              id="confirmar_senha"
              type="password"
              placeholder="Repita sua senha"
            ></app-input>

            <div class="auth__actions">
              <app-button type="submit" variant="primary" label="Cadastrar"></app-button>
              <app-button href="./index.html" variant="secondary" label="Voltar para início"></app-button>
            </div>
          </form>

          <p class="auth__back helper-text">
            Já conhece a plataforma? <a class="link-inline" href="./index.html">Acessar tela inicial</a>
          </p>
        </div>
      </section>
    </main>

    <script type="module" src="./src/cadastro.js"></script>
  </body>
</html>
